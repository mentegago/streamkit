name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release:
        description: Start release process (create tag and draft release)
        type: boolean
        default: false
      build_twitch:
        description: Build Twitch flavor
        type: boolean
        default: true
      build_youtube:
        description: Build YouTube flavor
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: inputs.release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set icon (Twitch)
        if: inputs.build_twitch
        shell: bash
        run: cp windows/runner/resources/app_icon_twitch.ico windows/runner/resources/app_icon.ico

      - name: Build Windows release (Twitch)
        if: inputs.build_twitch
        run: flutter build windows --release

      - name: Build installer (Twitch)
        if: inputs.build_twitch
        shell: cmd
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DSourceDir=%CD%\build\windows\x64\runner\Release
          /DOutputDir=%CD%\installer\builds
          installer\installer.iss

      - name: Set icon (YouTube)
        if: inputs.build_youtube
        shell: bash
        run: cp windows/runner/resources/app_icon_youtube.ico windows/runner/resources/app_icon.ico

      - name: Build Windows release (YouTube)
        if: inputs.build_youtube
        run: flutter build windows --release --dart-define=FLAVOR=youtube

      - name: Build installer (YouTube)
        if: inputs.build_youtube
        shell: cmd
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DSourceDir=%CD%\build\windows\x64\runner\Release
          /DOutputDir=%CD%\installer\builds
          installer\installer-youtube.iss

      - name: Upload installer artifact (Twitch)
        if: inputs.build_twitch
        uses: actions/upload-artifact@v4
        with:
          name: installer-twitch
          path: installer/builds/StreamKit_Twitch_${{ steps.version.outputs.version }}_Setup.exe

      - name: Upload installer artifact (YouTube)
        if: inputs.build_youtube
        uses: actions/upload-artifact@v4
        with:
          name: installer-youtube
          path: installer/builds/StreamKit_YouTube_*_Setup.exe

      - name: Create draft GitHub Release
        if: inputs.release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: installer/builds/*.exe
