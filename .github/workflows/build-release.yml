name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release:
        description: Start release process (create tag and draft release)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: inputs.release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build installer
        shell: cmd
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DSourceDir=build\windows\x64\runner\Release
          /DOutputDir=installer\builds
          installer\installer.iss

      - name: Create draft GitHub Release
        if: inputs.release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: installer/builds/*.exe
